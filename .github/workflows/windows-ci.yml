name: Windows JUCE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v1

      - name: Build Unit Tests
        run: msbuild Builds\VisualStudio2022\AudiogramApp.sln /p:Configuration=UnitTests /p:Platform=x64

      - name: Run Unit Tests
        run: Builds\VisualStudio2022\x64\UnitTests\AudiogramApp.exe